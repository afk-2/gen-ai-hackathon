<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Tool</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141417;
      --surface2: #1c1c21;
      --border: #2a2a33;
      --accent: #c8fb6e;
      --accent-dim: rgba(200, 251, 110, 0.08);
      --text: #e8e8ec;
      --muted: #6b6b7a;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,251,110,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,251,110,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(200,251,110,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 720px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg { display: block; }

    .header-text h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.3px;
      line-height: 1;
    }

    .header-text p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status-dot {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--muted);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* Input area */
    .input-section {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13.5px;
      line-height: 1.65;
      padding: 14px 16px;
      resize: vertical;
      min-height: 130px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea::placeholder { color: var(--muted); }

    textarea:focus {
      border-color: rgba(200,251,110,0.35);
      box-shadow: 0 0 0 3px rgba(200,251,110,0.06);
    }

    /* Action bar */
    .action-bar {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .char-count {
      font-size: 11px;
      color: var(--muted);
    }

    button {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 12.5px;
      font-weight: 500;
      padding: 9px 20px;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.18s;
      letter-spacing: 0.02em;
    }

    button:hover { opacity: 0.88; transform: translateY(-1px); }
    button:active { transform: translateY(0); opacity: 1; }
    button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-icon { width: 14px; height: 14px; }

    /* Output area */
    .output-section {
      padding: 20px;
      min-height: 120px;
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .output-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 12px;
      font-size: 11px;
      border-radius: 6px;
      display: none;
    }

    .copy-btn:hover { color: var(--text); border-color: var(--muted); }

    #output {
      font-size: 13.5px;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* States */
    .placeholder-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 0 12px;
      gap: 10px;
      color: var(--muted);
    }

    .placeholder-state svg { opacity: 0.3; }

    .placeholder-state p { font-size: 12px; }

    .loading-state {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 28px 0 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result-content { display: none; }

    /* Thinking tokens animation */
    .thinking {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }

    .thinking span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: think 1.1s ease-in-out infinite;
    }

    .thinking span:nth-child(2) { animation-delay: 0.18s; }
    .thinking span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes think {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40%            { transform: scale(1);   opacity: 1; }
    }

    /* Footer */
    .footer {
      margin-top: 18px;
      text-align: center;
      font-size: 11px;
      color: #3a3a48;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M10 3L3 7.5V12.5L10 17L17 12.5V7.5L10 3Z" fill="#0d0d0f"/>
        <path d="M10 8L7 9.5V12L10 13.5L13 12V9.5L10 8Z" fill="#0d0d0f" opacity="0.4"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>AI Tool</h1>
      <p>Language model interface</p>
    </div>
    <div class="status-dot">
      <div class="dot"></div>
      Ready
    </div>
  </div>

  <div class="card">
    <div class="input-section">
      <div class="label">Prompt</div>
      <textarea id="input" placeholder="Enter your prompt here…" oninput="updateCount()"></textarea>
    </div>

    <div class="action-bar">
      <span class="char-count" id="charCount">0 characters</span>
      <button id="runBtn" onclick="runAI()">
        <svg class="btn-icon" viewBox="0 0 14 14" fill="none">
          <path d="M2 2L12 7L2 12V2Z" fill="currentColor"/>
        </svg>
        Run
      </button>
    </div>

    <div class="output-section">
      <div class="output-header">
        <div class="output-label">Output</div>
        <button class="copy-btn" id="copyBtn" onclick="copyOutput()">Copy</button>
      </div>

      <div id="placeholderState" class="placeholder-state">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="4" y="8" width="20" height="2" rx="1" fill="currentColor"/>
          <rect x="4" y="13" width="14" height="2" rx="1" fill="currentColor"/>
          <rect x="4" y="18" width="17" height="2" rx="1" fill="currentColor"/>
        </svg>
        <p>Hi! I’m a chatbot here to assist you with any questions. Enter your prompt to get started.</p>
      </div>

      <div id="loadingState" class="loading-state">
        <div class="spinner"></div>
        <span>Generating</span>
        <div class="thinking">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div id="output" class="result-content"></div>
    </div>
  </div>

</div>

<script>
  let messages = [];

  function updateCount() {
    const len = document.getElementById('input').value.length;
    document.getElementById('charCount').textContent = len.toLocaleString() + ' character' + (len !== 1 ? 's' : '');
  }

  function setState(state) {
    const ph = document.getElementById('placeholderState');
    const ld = document.getElementById('loadingState');
    const out = document.getElementById('output');
    const copyBtn = document.getElementById('copyBtn');
    const runBtn = document.getElementById('runBtn');

    ph.style.display  = state === 'idle'    ? 'flex'         : 'none';
    ld.style.display  = state === 'loading' ? 'flex'         : 'none';
    out.style.display = state === 'result'  ? 'block'        : 'none';
    copyBtn.style.display = state === 'result' ? 'block'     : 'none';
    runBtn.disabled   = state === 'loading';
  }

  async function runAI() {
    const inputText = document.getElementById('input').value.trim();
    if (!inputText) return;

    messages.push({ role: "user", content: inputText });

    document.getElementById('input').value = "";
    updateCount();

    // keep only last 10 messages
    if (messages.length > 10) {
      messages = messages.slice(-10);
    }
    
    setState('loading');

    try {
      const response = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: messages })
      });

      const data = await response.json();
      const outputEl = document.getElementById('output');
      const reply = data.output || '(No response)';

      // store assistant reply
      messages.push({ role: "assistant", content: reply });

      // display chat
      renderMessages();

      setState('result');
    } catch (err) {
      const outputEl = document.getElementById('output');
      outputEl.textContent = 'Error: ' + (err.message || 'Request failed');
      setState('result');
    }
  }

  function copyOutput() {
    const text = document.getElementById('output').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = orig, 1800);
    });
  }

  function renderMessages() {
    const outputEl = document.getElementById('output');
    outputEl.innerHTML = "";

    messages.forEach(msg => {
      const div = document.createElement('div');
      div.style.marginBottom = "12px";

      div.innerHTML = `<strong>${msg.role === 'user' ? 'You' : 'AI'}:</strong><br>${msg.content}`;
      outputEl.appendChild(div);
    });
  }

  // Allow Ctrl+Enter to submit
  document.getElementById('input').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runAI();
  });
</script>
</body>
</html>
