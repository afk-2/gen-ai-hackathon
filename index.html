<!DOCTYPE html>
<html>
<head>
  <title>AI App</title>
</head>
<body>

<h2>AI Tool</h2>

<textarea id="input" rows="6" cols="50" placeholder="Enter text..."></textarea>
<br><br>

<button onclick="runAI()">Run</button>

<h3>Output:</h3>
<div id="output"></div>

<script>
async function runAI() {
  const inputText = document.getElementById("input").value;

  const API_KEY = "AIzaSyAXlOYkZfipPwkDgdvPvSdgaY1IW3HqHe4"
  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${API_KEY}`,
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        contents: [
          {
            parts: [
              {
                text: "explain it as if you're a phd student:\n" + inputText
              }
            ]
          }
        ]
      })
    }
  );

  const data = await response.json();
  document.getElementById("output").innerText =
    data.candidates[0].content.parts[0].text;
}
</script>

</body>
</html>
